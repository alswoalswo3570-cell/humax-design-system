name: humax_design_system
description: >
  Humax Design System — Flutter widget package.
  Contract-driven implementation of HumaxButton, HumaxTextField, HumaxAppBar,
  HumaxEmptyState, HumaxSkeleton, and HumaxErrorState.
  Every widget satisfies its corresponding contract under contracts/flutter/*.contract.json.
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  humax_design_tokens:
    path: ../humax_design_tokens

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
